    <script>
        AOS.init({ duration: 800, once: true });
        
        // OS Loader: This fetches your mission.html and injects it into #global-os
        document.addEventListener('DOMContentLoaded', () => {
            fetch('mission.html')
                .then(res => res.text())
                .then(data => document.getElementById('global-os').innerHTML = data);
        });
