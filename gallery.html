<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASTER ARCHIVE | Visual Proof 2026 | Raphael Lezius</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        :root {
            --gal-gold: var(--neon-gold);
            --gal-cyan: var(--neon-cyan);
            --bento-gap: 15px;
        }

        body { background: #020203 !important; color: #fff; overflow-x: hidden; }

        /* --- 1. EDITORIAL HERO --- */
        .gallery-hero {
            padding: 180px 0 80px;
            background: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            text-align: center;
        }
        .archive-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: #444;
        }
        .stat-item span { color: var(--gal-gold); font-weight: 800; }

        /* --- 2. SMART FILTER INTERFACE --- */
        .filter-container {
            position: sticky;
            top: 100px;
            z-index: 100;
            padding: 20px 0;
            background: rgba(2, 2, 3, 0.8);
            backdrop-filter: blur(20px);
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .filter-nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .filter-pill {
            background: #0a0a0c;
            border: 1px solid #1a1a1c;
            color: #666;
            padding: 10px 22px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .filter-pill.active { border-color: var(--gal-gold); color: var(--gal-gold); box-shadow: 0 0 15px rgba(212,175,55,0.1); }

        /* --- 3. BENTO CORE ENGINE --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 280px;
            gap: var(--bento-gap);
            grid-auto-flow: dense;
        }

        .bento-item {
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            background: #080a0d;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* Architectural Spanning */
        .span-w { grid-column: span 2; }
        .span-t { grid-row: span 2; }
        .span-l { grid-column: span 2; grid-row: span 2; }

        @media (max-width: 900px) { .span-w, .span-l { grid-column: span 1; } }
        @media (max-width: 600px) { .bento-grid { grid-template-columns: 1fr; } .span-t { grid-row: span 1; } }

        .bento-image {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: all 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .bento-item:hover { border-color: var(--gal-gold); z-index: 10; transform: translateY(-5px); }
        .bento-item:hover .bento-image { filter: grayscale(0%); transform: scale(1.05); }

        /* HUD Overlays */
        .bento-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 20px; opacity: 0; transition: 0.4s;
        }
        .bento-item:hover .bento-overlay { opacity: 1; }

        .tech-tag {
            position: absolute; top: 15px; right: 15px;
            font-family: var(--font-mono); font-size: 0.5rem;
            color: var(--gal-cyan); border: 1px solid var(--gal-cyan);
            padding: 3px 8px; border-radius: 2px; background: rgba(0,0,0,0.5);
        }

        .item-title { font-family: var(--font-head); font-size: 1rem; color: #fff; margin: 0; }
        .item-cat { font-family: var(--font-mono); font-size: 0.55rem; color: var(--gal-gold); text-transform: uppercase; }
    </style>
</head>

        pills.forEach(pill => {
            pill.addEventListener('click', () => {
                pills.forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                const filter = pill.dataset.filter;
                
                document.querySelectorAll('.bento-item').forEach(el => {
                    if(filter === 'all' || el.classList.contains(filter)) {
                        el.style.display = 'block';
                        setTimeout(() => el.style.opacity = '1', 10);
