<div id="missionOS" class="os-overlay">
    <div class="os-backdrop js-close-os"></div>
    <div class="case-container">
        <button class="os-close-btn js-close-os"><i class="fas fa-times"></i></button>
        
        <div class="mission-control-header">
            <h3>PROJECT_INITIALIZATION <span class="gold-text">v2026</span></h3>
            <div class="os-progress-bar"><div class="os-progress-fill" id="osProgress"></div></div>
            <div class="os-steps-indicator">
                <span class="step-text active" id="st1">01 IDENTITY</span>
                <span class="step-text" id="st2">02 SYSTEM</span>
                <span class="step-text" id="st3">03 TELEMETRY</span>
                <span class="step-text" id="st4">04 DEPLOY</span>
            </div>
        </div>

        <form id="leadForm" class="os-form">
            
            <div class="form-step is-active" data-step="1">
                <h4 class="step-heading"><i class="fas fa-user-shield"></i> 01 // CLIENT_IDENTITY</h4>
                <div class="input-group">
                    <input type="text" id="osName" class="os-input" required placeholder=" ">
                    <label class="os-label">VOLLSTÄNDIGER NAME *</label>
                </div>
                <div class="input-group">
                    <input type="tel" id="osPhone" class="os-input" required placeholder=" ">
                    <label class="os-label">TELEFONNUMMER *</label>
                </div>
                <button type="button" class="os-btn btn-next">AUTHORIZE <i class="fas fa-arrow-right"></i></button>
            </div>

            <div class="form-step" data-step="2">
                <h4 class="step-heading"><i class="fas fa-microchip"></i> 02 // SYSTEM_CONFIGURATION</h4>
                <p class="step-desc">Select the required installation module:</p>
                <div class="radio-grid-large">
                    <label class="radio-card-large cyan-hover">
                        <input type="radio" name="project" value="Küche" checked>
                        <div class="card-content-large"><i class="fas fa-utensils"></i><strong>KÜCHE</strong></div>
                    </label>
                    <label class="radio-card-large gold-hover">
                        <input type="radio" name="project" value="PAX">
                        <div class="card-content-large"><i class="fas fa-door-open"></i><strong>PAX</strong></div>
                    </label>
                    <label class="radio-card-large pink-hover">
                        <input type="radio" name="project" value="USM">
                        <div class="card-content-large"><i class="fas fa-gem"></i><strong>USM</strong></div>
                    </label>
                </div>
                <div class="input-group" style="margin-top: 20px;">
                    <input type="text" id="osPlan" class="os-input" placeholder=" ">
                    <label class="os-label">IKEA PLANUNGS-CODE (OPTIONAL)</label>
                </div>
                <div class="step-actions split">
                    <button type="button" class="os-btn-ghost btn-prev">BACK</button>
                    <button type="button" class="os-btn btn-next">NEXT <i class="fas fa-arrow-right"></i></button>
                </div>
            </div>

            <div class="form-step" data-step="3">
                <h4 class="step-heading"><i class="fas fa-map-marked-alt"></i> 03 // SITE_TELEMETRY</h4>
                <div class="input-group">
                    <input type="text" id="osPlz" class="os-input" required placeholder=" ">
                    <label class="os-label">PLZ & ORT *</label>
                </div>
                <div class="input-group">
                    <select id="osFloor" class="os-input">
                        <option value="EG">Erdgeschoss</option>
                        <option value="Lift">Aufzug (Material passt)</option>
                        <option value="Stairs">Treppenaufgang</option>
                    </select>
                </div>
                <div class="step-actions split">
                    <button type="button" class="os-btn-ghost btn-prev">BACK</button>
                    <button type="button" class="os-btn btn-next">FINALIZE <i class="fas fa-arrow-right"></i></button>
                </div>
            </div>

            <div class="form-step" data-step="4">
                <h4 class="step-heading"><i class="fas fa-rocket"></i> 04 // DATA_DEPLOYMENT</h4>
                <div class="input-group">
                    <textarea id="osDetails" class="os-input" rows="3" placeholder=" "></textarea>
                    <label class="os-label">PROJECT_NOTES // BESONDERHEITEN</label>
                </div>
                <div class="dsgvo-box">
                    <label class="custom-checkbox">
                        <input type="checkbox" required>
                        <span class="dsgvo-text">Datenfreigabe zur System-Initialisierung erfolgt gemäß DSGVO.</span>
                    </label>
                </div>
                <div class="step-actions split">
                    <button type="button" class="os-btn-ghost btn-prev">BACK</button>
                    <button type="submit" class="os-btn">INITIATE REQUEST <i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </form>
    </div>
</div>
